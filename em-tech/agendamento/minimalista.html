<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Tech — Marcar conversa</title>
<meta name="description" content="Marque uma conversa de 30 minutos com a EM Tech sobre o sistema que a sua empresa precisa.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../theme.css">
<style>
  html, body { height: 100%; }
  .stage { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px 24px; position: relative; }
  .stage .logo { margin-bottom: 56px; }
  .stage h1 { font-size: clamp(30px, 4.4vw, 44px); margin-top: 16px; max-width: 620px; }
  .stage p.lede { font-size: 17.5px; color: var(--text-secondary); margin-top: 20px; max-width: 480px; }
  .stage .btn-primary { margin-top: 40px; padding: 16px 34px; font-size: 16px; }
  .stage-footnote { margin-top: 20px; font-size: 14px; color: var(--text-secondary); }
  .stage-footnote a { color: var(--accent); text-decoration: underline; }

  /* ---------- Modal ---------- */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(5,6,15,0.75); align-items: center; justify-content: center; padding: 20px; z-index: 200; backdrop-filter: blur(4px); }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg-elevated); border: 1px solid var(--line-glow); border-radius: 14px; width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; padding: 28px; position: relative; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; color: var(--text-secondary); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .modal-close:hover { color: var(--accent); }
  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; padding-right: 32px; }
</style>
</head>
<body>

<a class="skip-link" href="#abrirAgenda">Pular para o conteúdo</a>

<div class="stage" id="conteudo">
  <div class="grid-lines" aria-hidden="true">
    <div class="vline" style="left: 30%"></div>
    <div class="vline" style="left: 70%"></div>
  </div>
  <div class="spotlight" aria-hidden="true"></div>

  <a href="../index.html" class="logo" aria-label="EM Tech, página inicial" style="position: relative; z-index: 1;">
    <svg width="26" height="26" viewBox="0 0 30 30" aria-hidden="true">
      <path class="logo-bracket" d="M10 6 L6 6 L6 24 L10 24" />
      <path class="logo-bracket" d="M20 6 L24 6 L24 24 L20 24" />
      <rect class="logo-cursor" x="14" y="8" width="2.2" height="14" />
    </svg>
    <span><span class="logo-word-em">EM</span> <span class="logo-word-tech">TECH</span></span>
  </a>

  <span class="eyebrow" style="position: relative; z-index: 1;">Agendamento direto</span>
  <h1 style="position: relative; z-index: 1;">Vamos falar sobre o seu sistema.</h1>
  <p class="lede" style="position: relative; z-index: 1;">Uma conversa de 30 minutos, sem formulário de qualificação antes. Escolha o horário e pronto.</p>

  <button class="btn-primary" id="abrirAgenda" style="position: relative; z-index: 1;">Marcar conversa</button>
  <p class="stage-footnote" style="position: relative; z-index: 1;">Prefere e-mail? <a href="mailto:contato@emtech.com.br">contato@emtech.com.br</a></p>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="modal-close" id="modalClose" aria-label="Fechar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6 L18 18 M18 6 L6 18"/></svg>
    </button>
    <h2 id="modalTitle">Escolha um horário</h2>
    <div id="scheduler"></div>
  </div>
</div>

<script src="../scheduler.js"></script>
<script>
  const openBtn = document.getElementById('abrirAgenda');
  const backdrop = document.getElementById('modalBackdrop');
  const closeBtn = document.getElementById('modalClose');
  let schedulerBuilt = false;

  function openModal() {
    backdrop.classList.add('open');
    if (!schedulerBuilt) { initScheduler('scheduler'); schedulerBuilt = true; }
    closeBtn.focus();
  }
  function closeModal() {
    backdrop.classList.remove('open');
    openBtn.focus();
  }
  openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  backdrop.addEventListener('click', function (e) { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal(); });
</script>
</body>
</html>
