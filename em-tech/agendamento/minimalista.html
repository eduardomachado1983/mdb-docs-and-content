<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EM Tech — Marcar conversa</title>
<meta name="description" content="Marque uma conversa de 30 minutos com a EM Tech sobre o sistema que a sua empresa precisa.">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #1C2733;
    --color-secondary: #4A4A52;
    --color-neutral: #F6F5F3;
    --color-accent: #B5652F;
    --color-white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--color-neutral);
    color: var(--color-primary);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  :focus-visible { outline: 3px solid var(--color-accent); outline-offset: 3px; }

  .skip-link {
    position: absolute; left: -999px; top: 0;
    background: var(--color-accent); color: var(--color-white);
    padding: 12px 20px; z-index: 1000; font-weight: 600;
  }
  .skip-link:focus { left: 24px; top: 24px; }

  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-bottom: 56px; }
  .logo-bracket { stroke-width: 4.5; stroke-linecap: square; stroke-linejoin: miter; fill: none; stroke: var(--color-primary); }
  .logo-cursor { fill: var(--color-accent); }
  @media (prefers-reduced-motion: no-preference) { .logo-cursor { animation: blink 1.1s steps(1, start) infinite; } }
  @keyframes blink { 50% { opacity: 0; } }
  .logo-word-em { font-weight: 600; font-size: 20px; }
  .logo-word-tech { font-weight: 600; font-size: 12px; letter-spacing: 0.14em; color: var(--color-accent); text-transform: uppercase; }

  .label { font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-accent); }
  h1 { font-size: clamp(30px, 4.4vw, 44px); font-weight: 600; letter-spacing: -0.01em; line-height: 1.15; margin-top: 16px; max-width: 620px; }
  .stage p.lede { font-size: 17.5px; color: var(--color-secondary); margin-top: 20px; max-width: 480px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 16px 34px; font-family: inherit; font-size: 16px; font-weight: 600;
    border: none; border-radius: 2px; cursor: pointer; background: var(--color-accent); color: var(--color-white);
    margin-top: 40px;
  }
  .btn:hover { background: #9c5527; }

  .stage-footnote { margin-top: 20px; font-size: 14px; color: var(--color-secondary); }
  .stage-footnote a { color: var(--color-accent); text-decoration: underline; }

  /* ---------- Modal ---------- */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,39,51,0.6);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 200;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--color-white);
    border-radius: 4px;
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 28px;
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none; cursor: pointer;
    color: var(--color-secondary);
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { color: var(--color-accent); }
  .modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; padding-right: 32px; }

  /* ---------- Scheduler widget ---------- */
  .scheduler-cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .scheduler-cal-header span { font-weight: 600; font-size: 16px; text-transform: capitalize; }
  .scheduler-nav-btn {
    background: none; border: 1px solid rgba(74,74,82,0.25); border-radius: 2px;
    width: 30px; height: 30px; cursor: pointer; color: var(--color-primary);
    display: flex; align-items: center; justify-content: center;
  }
  .scheduler-nav-btn:hover { border-color: var(--color-accent); color: var(--color-accent); }
  .scheduler-weekdays, .scheduler-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
  .scheduler-weekdays span { font-size: 11.5px; font-weight: 500; color: var(--color-secondary); padding-bottom: 8px; text-transform: uppercase; letter-spacing: 0.03em; }
  .scheduler-days button { aspect-ratio: 1; border: 1px solid transparent; background: none; font-family: inherit; font-size: 14px; color: var(--color-primary); border-radius: 2px; cursor: pointer; }
  .scheduler-days button:disabled { color: #C7C9CC; cursor: not-allowed; }
  .scheduler-days button.bookable:hover { border-color: var(--color-accent); }
  .scheduler-days button.today { font-weight: 600; }
  .scheduler-days button.selected { background: var(--color-accent); color: var(--color-white); }
  .scheduler-days button.empty { visibility: hidden; }

  .scheduler-slots { margin-top: 24px; border-top: 1px solid rgba(74,74,82,0.14); padding-top: 20px; text-align: left; }
  .scheduler-hint { font-size: 14.5px; color: var(--color-secondary); }
  .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .slot-btn { padding: 10px 8px; font-family: inherit; font-size: 14px; font-weight: 500; border: 1.5px solid rgba(74,74,82,0.25); background: var(--color-white); color: var(--color-primary); border-radius: 2px; cursor: pointer; }
  .slot-btn:hover:not(:disabled) { border-color: var(--color-accent); color: var(--color-accent); }
  .slot-btn.selected { background: var(--color-accent); border-color: var(--color-accent); color: var(--color-white); }
  .slot-btn:disabled { color: #C7C9CC; border-color: rgba(74,74,82,0.1); cursor: not-allowed; text-decoration: line-through; }
  .slot-label { font-size: 13px; font-weight: 500; color: var(--color-secondary); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 12px; }

  .confirm-form { display: flex; flex-direction: column; gap: 12px; }
  .confirm-form input { padding: 11px 12px; font-family: inherit; font-size: 14.5px; border: 1.5px solid rgba(74,74,82,0.25); border-radius: 2px; background: var(--color-white); color: var(--color-primary); }
  .confirm-form input:focus-visible { border-color: var(--color-accent); }
  .confirm-form .btn { margin-top: 4px; padding: 12px 20px; font-size: 15px; }
  .confirm-summary { font-size: 14.5px; color: var(--color-secondary); margin-bottom: 4px; }
  .confirm-summary strong { color: var(--color-primary); }

  .success-state { text-align: center; padding: 12px 0; }
  .success-icon { width: 46px; height: 46px; border-radius: 50%; border: 2px solid var(--color-accent); color: var(--color-accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
  .success-state h3 { font-size: 17px; margin-bottom: 8px; }
  .success-state p { font-size: 14.5px; color: var(--color-secondary); margin-bottom: 16px; }
  .link-reset { background: none; border: none; color: var(--color-accent); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<a class="skip-link" href="#abrirAgenda">Pular para o conteúdo</a>

<div class="stage" id="conteudo">
  <a href="../index.html" class="logo" aria-label="EM Tech, página inicial">
    <svg width="26" height="26" viewBox="0 0 30 30" aria-hidden="true">
      <path class="logo-bracket" d="M10 6 L6 6 L6 24 L10 24" />
      <path class="logo-bracket" d="M20 6 L24 6 L24 24 L20 24" />
      <rect class="logo-cursor" x="14" y="8" width="2.2" height="14" />
    </svg>
    <span><span class="logo-word-em">EM</span> <span class="logo-word-tech">TECH</span></span>
  </a>

  <span class="label">Agendamento direto</span>
  <h1>Vamos falar sobre o seu sistema.</h1>
  <p class="lede">Uma conversa de 30 minutos, sem formulário de qualificação antes. Escolha o horário e pronto.</p>

  <button class="btn" id="abrirAgenda">Marcar conversa</button>
  <p class="stage-footnote">Prefere e-mail? <a href="mailto:contato@emtech.com.br">contato@emtech.com.br</a></p>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <button class="modal-close" id="modalClose" aria-label="Fechar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6 L18 18 M18 6 L6 18"/></svg>
    </button>
    <h2 id="modalTitle">Escolha um horário</h2>
    <div id="scheduler"></div>
  </div>
</div>

<script src="../scheduler.js"></script>
<script>
  const openBtn = document.getElementById('abrirAgenda');
  const backdrop = document.getElementById('modalBackdrop');
  const closeBtn = document.getElementById('modalClose');
  let schedulerBuilt = false;

  function openModal() {
    backdrop.classList.add('open');
    if (!schedulerBuilt) { initScheduler('scheduler'); schedulerBuilt = true; }
    closeBtn.focus();
  }
  function closeModal() {
    backdrop.classList.remove('open');
    openBtn.focus();
  }
  openBtn.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  backdrop.addEventListener('click', function (e) { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && backdrop.classList.contains('open')) closeModal(); });
</script>
</body>
</html>
